apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "osac-aap.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-aap.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "osac-aap.fullname" . }}-sa
  labels:
    {{- include "osac-aap.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "osac-aap.fullname" . }}-sa
    namespace: {{ .Release.Namespace }}
