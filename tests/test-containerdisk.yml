---
# Test: Windows golden image with containerDisk
- name: Test Windows Golden Image with containerDisk
  hosts: localhost
  gather_facts: false

  vars:
    test_vm_name: "test-windows-containerdisk"
    test_namespace: "test-containerdisk"
    remote_cluster_kubeconfig: "{{ lookup('env', 'KUBECONFIG') }}"
    remote_cluster_context: "osac-lab/api-my-sno-internal:6443/system:admin"

    compute_instance:
      metadata:
        name: "{{ test_vm_name }}"
        namespace: "{{ test_namespace }}"
        annotations:
          osac.openshift.io/tenant: "{{ test_namespace }}"
          osac.openshift.io/guest-os-family: "windows"
      spec:
        cores: 4
        memoryGiB: 8
        bootDisk:
          sizeGiB: 80
        image:
          sourceRef: "quay.io/jhernand/ci:0"
        runStrategy: "Always"

  tasks:
    - name: Create test namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ remote_cluster_kubeconfig }}"
        context: "{{ remote_cluster_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ test_namespace }}"

    - name: Deploy Windows VM with containerDisk
      ansible.builtin.include_role:
        name: osac.templates.ocp_virt_vm
        tasks_from: create
      vars:
        vm_use_container_disk: true  # Use containerDisk instead of dataVolume
        vm_enable_sysprep: false     # Skip sysprep for golden image
        guest_os_family: windows
        compute_instance_name: "{{ test_vm_name }}"
        tenant_target_namespace: "{{ test_namespace }}"
        tenant_storage_class_name: "lvms-vg1"  # Not used with containerDisk
        template_parameters: {}
        template_id: "ocp_virt_vm"
        compute_instance_label: "osac.openshift.io/compute-instance"

    - name: Verify containerDisk volume is used
      kubernetes.core.k8s_info:
        kubeconfig: "{{ remote_cluster_kubeconfig }}"
        context: "{{ remote_cluster_context }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: "{{ test_vm_name }}"
        namespace: "{{ test_namespace }}"
      register: vm_info

    - name: Check volume type
      ansible.builtin.assert:
        that:
          - vm_info.resources[0].spec.template.spec.volumes | selectattr('name', 'equalto', 'root-disk') | map(attribute='containerDisk') | list | length > 0
        success_msg: "✓ containerDisk volume configured correctly"
        fail_msg: "✗ containerDisk not found - check configuration"

    - name: Display VM status
      ansible.builtin.debug:
        msg: |
          VM created with containerDisk!

          Volume: {{ vm_info.resources[0].spec.template.spec.volumes | selectattr('name', 'equalto', 'root-disk') | list }}

          Verify VM boots:
          kubectl get vm {{ test_vm_name }} -n {{ test_namespace }}
          virtctl vnc {{ test_vm_name }} -n {{ test_namespace }}
