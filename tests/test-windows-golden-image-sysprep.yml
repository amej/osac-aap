---
# Test playbook for Windows golden image with sysprep OOBE configuration
# Tests keyboard, region, language, admin password, and direct desktop login
# Usage: ansible-playbook tests/test-windows-golden-image-sysprep.yml

- name: Test Windows Golden Image with Sysprep OOBE
  hosts: localhost
  gather_facts: false

  vars:
    # Test VM configuration
    test_vm_name: "test-windows-sysprep-vm"
    test_namespace: "test-golden-images"
    golden_image_ref: "quay.io/jhernand/ci:0"
    remote_cluster_kubeconfig: "{{ lookup('env', 'KUBECONFIG') }}"

    # ComputeInstance spec for golden image testing with sysprep
    compute_instance:
      metadata:
        name: "{{ test_vm_name }}"
        namespace: "{{ test_namespace }}"
        annotations:
          osac.openshift.io/tenant: "{{ test_namespace }}"
          osac.openshift.io/guest-os-family: "windows"
      spec:
        templateID: osac.templates.ocp_virt_vm
        cores: 2
        memoryGiB: 4
        bootDisk:
          sizeGiB: 80
        image:
          sourceType: registry
          sourceRef: "{{ golden_image_ref }}"
        runStrategy: "Always"
      status:
        desiredConfigVersion: "1"

  tasks:
    - name: Create test namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ test_namespace }}"

    - name: Create ComputeInstance CR for testing
      kubernetes.core.k8s:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: osac.openshift.io/v1alpha1
          kind: ComputeInstance
          metadata:
            name: "{{ test_vm_name }}"
            namespace: "{{ test_namespace }}"
            annotations:
              osac.openshift.io/tenant: "{{ test_namespace }}"
              osac.openshift.io/guest-os-family: "windows"
          spec:
            templateID: osac.templates.ocp_virt_vm
            cores: 2
            memoryGiB: 4
            bootDisk:
              sizeGiB: 80
            image:
              sourceType: registry
              sourceRef: "{{ golden_image_ref }}"
            runStrategy: "Always"
          status:
            desiredConfigVersion: "1"

    - name: Deploy Windows golden image VM with sysprep OOBE
      ansible.builtin.include_role:
        name: osac.templates.ocp_virt_vm
        tasks_from: create
      vars:
        # Enable sysprep for OOBE configuration
        vm_enable_sysprep: true

        # Sysprep OOBE configuration
        vm_sysprep_admin_password: "P@ssw0rd123!"
        vm_sysprep_autologon_enabled: true
        vm_sysprep_timezone: "Eastern Standard Time"
        vm_sysprep_input_locale: "en-US"
        vm_sysprep_system_locale: "en-US"
        vm_sysprep_ui_language: "en-US"
        vm_sysprep_user_locale: "en-US"

        # VM configuration
        guest_os_family: windows
        compute_instance_name: "{{ test_vm_name }}"
        tenant_target_namespace: "{{ test_namespace }}"
        tenant_storage_class_name: "lvms-vg1"
        template_parameters: {}
        template_id: "ocp_virt_vm"
        compute_instance_label: "osac.openshift.io/compute-instance"

    - name: Wait for VM to reach Running state
      kubernetes.core.k8s_info:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: "{{ test_vm_name }}"
        namespace: "{{ test_namespace }}"
      register: vm_status
      until:
        - vm_status.resources | length > 0
        - vm_status.resources[0].status.ready | default(false) | bool
      retries: 90
      delay: 10

    - name: Display VM status
      ansible.builtin.debug:
        msg: |
          VM Status: {{ vm_status.resources[0].status.ready }}

          Sysprep OOBE Configuration Applied:
          - Admin Password: P@ssw0rd123!
          - Auto Logon: Enabled
          - Keyboard Layout: en-US
          - Region/Locale: en-US
          - UI Language: en-US
          - Timezone: Eastern Standard Time

          Next steps:
          1. Connect to VNC console:
             virtctl vnc {{ test_vm_name }} -n {{ test_namespace }}

          2. Verify Windows boots directly to desktop (automatic login)

          3. Verify keyboard, region, and language settings are configured

          4. Check sysprep ConfigMap was created:
             kubectl get configmap {{ test_vm_name }}-sysprep -n {{ test_namespace }} -o yaml

    - name: Verify sysprep disk attached
      ansible.builtin.set_fact:
        vm_volumes: "{{ vm_status.resources[0].spec.template.spec.volumes }}"

    - name: Assert sysprep disk present
      ansible.builtin.assert:
        that:
          - vm_volumes | selectattr('name', 'equalto', 'sysprep-disk') | list | length == 1
        success_msg: "✓ Sysprep disk attached - OOBE configuration will be applied"
        fail_msg: "✗ No sysprep disk found - vm_enable_sysprep flag may not be working"

    - name: Verify sysprep ConfigMap exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        api_version: v1
        kind: ConfigMap
        name: "{{ test_vm_name }}-sysprep"
        namespace: "{{ test_namespace }}"
      register: sysprep_configmap

    - name: Assert sysprep ConfigMap created
      ansible.builtin.assert:
        that:
          - sysprep_configmap.resources | length == 1
          - sysprep_configmap.resources[0].data['Unattend.xml'] is defined
        success_msg: "✓ Sysprep ConfigMap created with unattend.xml"
        fail_msg: "✗ Sysprep ConfigMap not found or missing Unattend.xml"

    - name: Display sysprep unattend.xml content
      ansible.builtin.debug:
        msg: "{{ sysprep_configmap.resources[0].data['Unattend.xml'] }}"

    - name: Cleanup instructions
      ansible.builtin.debug:
        msg: |
          Test completed successfully!

          To clean up resources:
          kubectl delete computeinstance {{ test_vm_name }} -n {{ test_namespace }}
          kubectl delete vm {{ test_vm_name }} -n {{ test_namespace }}
          kubectl delete namespace {{ test_namespace }}
